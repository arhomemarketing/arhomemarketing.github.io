<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arhome realty Marketing Materials Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap');

        :root {
            --primary: #016dff;
            --secondary: #ff9595;
            --accent: #bbd162;
        }

        body {
            font-family: 'Avenir Next LT Pro', 'Montserrat', sans-serif;
            background-color: #f8fafc;
            text-transform: lowercase;
            font-weight: 700;
        }

        h1, h2, h3, h4, h5, h6, p, span, button, label, div.material-card h4, div.flyer-type-card h4, .marketing-note p, .success-message p, .loading-overlay p, label[for="pen-logo"], label {
            text-transform: lowercase;
            font-family: 'Avenir Next LT Pro', 'Montserrat', sans-serif;
            font-weight: 700;
        }

        label[for="card-fullName"],
        label[for="doorhanger-doorhangerText"],
        label[for="card-backSideText"] {
             text-transform: none; /* Allow specific labels to keep their case */
        }


        input, select, textarea {
            font-family: 'Avenir Next LT Pro', 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: none; /* Ensure inputs never inherit lowercase */
        }

        /* Ensure dropdown options maintain normal case for prices */
        select option {
             text-transform: none;
        }

        .btn-primary { background-color: var(--primary); color: white; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #0055cc; }
        .btn-secondary { background-color: var(--secondary); color: white; transition: all 0.3s ease; }
        .btn-secondary:hover { background-color: #ff7070; }
        .btn-accent { background-color: var(--accent); color: #333; transition: all 0.3s ease; }
        .btn-accent:hover { background-color: #a9c046; }

        .material-card { border: 2px solid transparent; transition: all 0.3s ease; cursor: pointer; }
        .material-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .material-card.selected { border-color: var(--primary); background-color: rgba(1, 109, 255, 0.05); }

        .step-indicator { width: 30px; height: 30px; border-radius: 50%; background-color: #e2e8f0; color: #64748b; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .step-indicator.active { background-color: var(--primary); color: white; }
        .step-indicator.completed { background-color: var(--accent); color: #333; }

        .step-line { flex-grow: 1; height: 2px; background-color: #e2e8f0; }
        .step-line.active { background-color: var(--accent); }

        input:focus, textarea:focus, select:focus { outline: 2px solid var(--primary); border-color: transparent; box-shadow: none; }

        .flyer-type-card { border: 2px solid transparent; transition: all 0.3s ease; cursor: pointer; }
        .flyer-type-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .flyer-type-card.selected { border-color: var(--primary); background-color: rgba(1, 109, 255, 0.05); }

        .review-label { color: var(--primary); font-weight: 600; }
        .section-title { text-decoration: underline; text-underline-offset: 4px; }
        .radio-container { display: flex; align-items: center; margin-right: 1rem; }
        .radio-container input[type="radio"] { margin-right: 0.5rem; }

        .form-section-title { font-weight: 700; color: #4a5568; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .checkbox-container { display: flex; align-items: center; margin-right: 1rem; margin-bottom: 0.5rem; }
        .checkbox-container input[type="checkbox"] { margin-right: 0.5rem; }
